name: PR commands
# Single entry point for comment/review-driven commands, so each comment fires
# one workflow run (not one per command). Routes to either:
#   - Claude   : a comment / review / issue mentioning @claude
#   - e2e      : a maintainer comments a line starting with /e2e-prod or /e2e-stage
#                on a pull request (delegates to the reusable e2e.yml workflow).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

concurrency:
  group: pr-commands-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude PR Action
        uses: anthropics/claude-code-action@f4fb5c6cdccc1ee7af63692f5d08d56efaa64cc8 # v1.0.121
        with:
          anthropic_api_key: ${{ secrets.NEXTFLOW_ANTHROPIC_API_KEY }}
          timeout_minutes: "60"

  # Maintainer /e2e-prod or /e2e-stage on a PR. The reusable workflow inherits
  # github.event.comment.* and parses the environment from the comment itself.
  # NOTE: the maintainer gate is the security boundary — the e2e workflow builds
  # and runs the PR head (incl. forks) with publish-capable secrets, so only
  # trigger on PRs whose code you've reviewed.
  e2e:
    if: >-
      github.event_name == 'issue_comment' && github.event.issue.pull_request &&
      ( contains(github.event.comment.body, '/e2e-prod') || contains(github.event.comment.body, '/e2e-stage') ) &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/e2e.yml
    secrets:
      SEQERA_PUBLIC_CR_PASSWORD: ${{ secrets.SEQERA_PUBLIC_CR_PASSWORD }}
      AUTOMATION_GITHUB_TOKEN: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}
