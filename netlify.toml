# Netlify configuration for Nextflow documentation

# No deployment previews unless the docs are edited
[build]
  # Base directory for the build
  base = "docs/"

  # Build command
  command = "npm run build"

  # Directory to publish (output directory)
  publish = "build/"

  # Ignore builds if no changes in docs directory
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ."

# Node.js version
[build.environment]
  # Set node version
  NODE_VERSION = "22"
  # Limit Node.js memory to 2GB
  NODE_OPTIONS = "--max-old-space-size=2048"

# Proxy redirects to integrate with other documentation sites
# Status 200 creates a proxy/rewrite (appears as one site) instead of a redirect

# Platform Cloud docs - hosted on seqera-docs.netlify.app
[[redirects]]
  from = "/platform-cloud/*"
  to = "https://seqera-docs.netlify.app/platform-cloud/:splat"
  status = 200

# Platform Enterprise docs - hosted on seqera-docs.netlify.app
[[redirects]]
  from = "/platform-enterprise/*"
  to = "https://seqera-docs.netlify.app/platform-enterprise/:splat"
  status = 200

# MultiQC docs - hosted on seqera-docs.netlify.app
[[redirects]]
  from = "/multiqc/*"
  to = "https://seqera-docs.netlify.app/multiqc/:splat"
  status = 200


# Wave docs - hosted on seqera-docs.netlify.app
[[redirects]]
  from = "/wave/*"
  to = "https://seqera-docs.netlify.app/wave/:splat"
  status = 200

# Fusion docs - hosted on seqera-docs.netlify.app
[[redirects]]
  from = "/fusion/*"
  to = "https://seqera-docs.netlify.app/fusion/:splat"
  status = 200

# Changelog docs - hosted on seqera-docs.netlify.app
[[redirects]]
  from = "/changelog/*"
  to = "https://seqera-docs.netlify.app/changelog/:splat"
  status = 200

# Platform CLI docs - hosted on seqera-docs.netlify.app
[[redirects]]
  from = "/platform-cli/*"
  to = "https://seqera-docs.netlify.app/platform-cli/:splat"
  status = 200

# Platform API docs - too large to build on main site
[[redirects]]
  from = "/platform-api/*"
  to = "https://seqera-docs-api.netlify.app/platform-api/:splat"
  status = 200

# Asset and image routing handled by Edge Function
# See .netlify/edge-functions/asset-proxy.js
[[edge_functions]]
  function = "asset-proxy"
  path = "/assets/*"

[[edge_functions]]
  function = "asset-proxy"
  path = "/img/*"

# Add noindex header to prevent search engine indexing
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex"