# Netlify configuration for Nextflow documentation

# No deployment previews unless the docs are edited
[build]
  # Base directory for the build
  base = "docs/"

  # Build command
  command = "npm run build"

  # Directory to publish (output directory)
  publish = "build/"

  # Ignore builds if no changes in docs directory
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ."

# Node.js version
[build.environment]
  # Set node version
  NODE_VERSION = "22"
  # Limit Node.js memory to 2GB
  NODE_OPTIONS = "--max-old-space-size=2048"

# Proxy redirects to integrate with other documentation sites
# Status 200 creates a proxy/rewrite (appears as one site) instead of a redirect

# Seqera API docs are too large to host / build on netlify on their own.
# The appropriate ENVVAR is set to disable the API Builds on Netlify for the main docs site. 
[[redirects]]
  from = "/platform-api/*"
  to = "https://seqera-docs-api.netlify.app/platform-api/:splat"
  status = 200


# Redirect missing assets (so that we don't lose CSS on the API docs)
# NB: Force is not true, so will use local if available
[[redirects]]
  from = "/assets/*"
  to = "https://seqera-docs-api.netlify.app/assets/:splat"
  status = 200

[headers.values]
    X-Robots-Tag = "noindex"